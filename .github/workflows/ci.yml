name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  ALLURE_RESULTS_DIR: allure-results

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-jest-${{ matrix.node-version }}
          path: allure-results/

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000
      - run: npm run test:api
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-cucumber
          path: allure-results/

  ui-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install ${{ matrix.browser }} --with-deps
      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000
      - run: npm run test:ui -- --project=${{ matrix.browser }}
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-playwright-${{ matrix.browser }}
          path: allure-results/

  allure-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-allure-results
          merge-multiple: true
      - name: Generate Report
        run: npx allure generate all-allure-results --clean -o allure-report
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report